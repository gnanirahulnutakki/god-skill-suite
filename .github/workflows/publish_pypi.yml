name: Publish to PyPI

on:
  # Uncomment the lines below once you've configured Trusted Publishing on pypi.org:
  # 1. Go to https://pypi.org → Account → Publishing → Add Pending Publisher
  # 2. Set: Owner=gnanirahulnutakki, Repo=god-skill-suite, Workflow=publish_pypi.yml
  # release:
  #   types: [published]
  workflow_dispatch:  # Manual trigger only until PyPI is configured

jobs:
  pypi-publish:
    name: Upload Release to PyPI
    runs-on: ubuntu-latest
    
    # Required for OIDC Trusted Publisher
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install build tool
        run: python3 -m pip install --upgrade build
        
      - name: Build sdist and wheel
        run: python3 -m build
        
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
